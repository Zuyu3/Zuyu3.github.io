    Publications:
      - title: What makes a good order of examples in in-context learning
        authors:
          - Guo, Qi and Wang, Leiyu and Wang, Yidong and Ye, Wei and Zhang, Shikun
        publisher: ACL Findings
        releaseDate: 2024
        url: https://aclanthology.org/2024.findings-acl.884/
        summary: In-context learning is highly sensitive to the order of few-shot examples, but prior ordering heuristics typically rely on additional in-domain (often unlabeled) data and still miss instance-specific differences. We analyze what makes an example order performant at both the corpus and instance levels, and propose **DEmO**, which adaptively selects a strong order for each test instance without extra data. DEmO filters candidate orders by **label fairness** and then picks the most influential order per instance using a **content-free metric**, achieving strong gains over competitive baselines and generalizing well across settings.

